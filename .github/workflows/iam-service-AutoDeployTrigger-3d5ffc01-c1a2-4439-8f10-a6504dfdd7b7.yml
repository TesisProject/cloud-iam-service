name: Trigger auto deployment for iam-service

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/iam-service-AutoDeployTrigger-3d5ffc01-c1a2-4439-8f10-a6504dfdd7b7.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.IAMSERVICE_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.IAMSERVICE_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.IAMSERVICE_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: ghcr.io/tesisproject
          registryUsername: ${{ secrets.IAMSERVICE_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.IAMSERVICE_REGISTRY_PASSWORD }}
          containerAppName: iam-service
          resourceGroup: ParkVision
          imageToBuild: ghcr.io/tesisproject/iam-service:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


