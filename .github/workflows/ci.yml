name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Build & Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: parkvision_db
          POSTGRES_USER: parkvision
          POSTGRES_PASSWORD: parkvision
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'eclipse-temurin'
          cache: maven

      - name: Run tests
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/parkvision_db
          SPRING_DATASOURCE_USERNAME: parkvision
          SPRING_DATASOURCE_PASSWORD: parkvision
          MAIL_USERNAME: test@example.com
          MAIL_PASSWORD: dummy
        run: ./mvnw test
