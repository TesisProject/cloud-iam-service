name: Publish images

# Construye y publica las imágenes de cada servicio en GitHub Container Registry (ghcr.io).
# - push a main: publica con tag `latest` + sha corto.
# - workflow_dispatch: permite ejecutarlo a mano desde la pestaña Actions sobre cualquier rama
#   (útil mientras el refactor aún no está en main).
on:
  push:
    # `refactor/**` permite probar el publish antes de mergear a main (workflow_dispatch
    # solo aparece cuando el workflow ya vive en la rama por defecto).
    branches: ["main", "refactor/**"]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write       # necesario para que GITHUB_TOKEN pueda publicar en ghcr.io

    strategy:
      fail-fast: false
      matrix:
        # El nombre = carpeta del módulo = nombre del Dockerfile (context = raíz del repo).
        service:
          - iam-service
          - parking-service
          - occupancy-service
          - prediction-service
          - notifications-service
          - parkvision-gateway
          - parkvision-discovery

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          # metadata-action pasa el nombre a minúsculas (ghcr lo exige): TesisProject -> tesisproject
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ matrix.service }}
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=ref,event=branch
            type=sha,format=short

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .                              # raíz del repo (reactor Maven multi-módulo)
          file: ${{ matrix.service }}/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
