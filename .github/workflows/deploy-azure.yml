name: Deploy to Azure Container Apps

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Docker Publish"]   # corre después de publicar la imagen en ghcr
    types: [completed]
    branches: [main]

permissions:
  id-token: write      # OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy image to Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: cloud-iam-service
          resourceGroup: ParkVision
          imageToDeploy: ghcr.io/tesisproject/cloud-iam-service:latest
          registryUrl: ghcr.io
          registryUsername: ${{ github.actor }}
          registryPassword: ${{ secrets.GHCR_PAT }}
          targetPort: 8081
          ingress: external
