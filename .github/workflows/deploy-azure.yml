name: Deploy to Azure Container Apps

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["Docker Publish"]   # corre después de publicar la imagen en ghcr
    types: [completed]
    branches: [main]

permissions:
  id-token: write      # OIDC
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Deploy image to Container App
        uses: azure/container-apps-deploy-action@v2
        with:
          containerAppName: cloud-iam-service
          resourceGroup: ParkVision
          imageToDeploy: ghcr.io/tesisproject/cloud-iam-service:latest
          targetPort: 8081
          ingress: external
          environmentVariables: >-
            SPRING_DATASOURCE_URL=${{ secrets.SPRING_DATASOURCE_URL }}
            SPRING_DATASOURCE_USERNAME=${{ secrets.SPRING_DATASOURCE_USERNAME }}
            SPRING_DATASOURCE_PASSWORD=${{ secrets.SPRING_DATASOURCE_PASSWORD }}
            JWT_PRIVATE_KEY=${{ secrets.JWT_PRIVATE_KEY }}
            JWT_PUBLIC_KEY=${{ secrets.JWT_PUBLIC_KEY }}
